<style>
  @import url("https://fonts.googleapis.com/css2?family=Jura:wght@500;700&family=Oswald:wght@400&family=Inter:wght@400;700&display=swap");

  .mg-theme {
    /* CSS Variablen für die SVGs */
    --svg-solid: #ffffff;
    --svg-empty: #666666;
    --svg-line: #ffffff;
    --svg-bg: #111213; /* Hintergrundfarbe (auch für das 'H' genutzt) */

    font-family: "Inter", sans-serif;
    background-color: var(--svg-bg);
    padding: 2vh 2vw;
    border-radius: 8px;
    color: #d1d5db;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
    min-height: 400px;
  }

  .mg-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 2vh;
    border-bottom: 2px solid #fff;
    padding-bottom: 1vh;
    flex-shrink: 0;
  }

  .mg-brand {
    font-size: clamp(10px, 1vh + 0.5vw, 18px);
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    font-family: "Oswald", sans-serif;
    margin-bottom: -5px;
  }

  .mg-title {
    color: #ffffff;
    font-family: "Jura", sans-serif;
    font-size: clamp(24px, 4vh + 2vw, 60px);
    font-weight: 700;
    letter-spacing: 2px;
    margin: 0;
    line-height: 1;
  }

  .mg-list {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    width: 100%;
    overflow-y: auto;
  }

  .mg-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid #2a2a2a;
    padding: 1.5vh 0;
  }

  .mg-row:last-child {
    border-bottom: none;
  }

  .mg-row.header {
    padding-bottom: 0.5vh;
    border-bottom: 1px solid #555;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    background-color: var(--svg-bg);
    z-index: 10;
  }

  .col-combo {
    width: 40%;
    min-width: 120px;
    max-width: 200px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }

  .col-action {
    width: 60%;
    font-size: clamp(11px, 1.8vh + 0.4vw, 24px);
    font-weight: 500;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding-left: 3vw;
  }

  .combo-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .badge {
    background-color: #333;
    color: #ddd;
    font-size: 0.7em;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "Roboto Mono", monospace;
    white-space: nowrap;
    border: 1px solid #555;
  }

  /* Smartphone Querformat & Desktop -> Spaltenweise Sortierung (1-6 links, 7-12 rechts) */
  @media (min-width: 768px), (orientation: landscape) {
    .mg-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto repeat(6, 1fr);
      grid-auto-flow: column;
      column-gap: 4vw;
      align-content: start;
    }
    .mg-row.header {
      grid-column: 1 / -1;
      grid-row: 1;
    }
    .mg-row {
      padding: 1.2vh 0;
    }
    .mg-row:nth-child(7) {
      border-bottom: none;
    }
    .mg-header {
      margin-bottom: 1vh;
    }
  }

  @media print {
    .mg-theme {
      background-color: #fff;
      padding: 0;
      color: #000;
      height: auto;
      border: none;
      --svg-solid: #000000;
      --svg-empty: #aaaaaa;
      --svg-line: #000000;
      --svg-bg: #ffffff;
    }
    .mg-title {
      color: #000;
      border-bottom-color: #000;
    }
    .mg-row {
      border-bottom-color: #ccc;
      page-break-inside: avoid;
    }
    .col-action {
      color: #000;
    }
    .badge {
      border-color: #999;
      background: #eee;
      color: #000;
    }
    .mg-row.header {
      position: relative;
      background: transparent;
      border-bottom-color: #000;
    }
  }
</style>

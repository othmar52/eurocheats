<style>
  @import url("https://fonts.googleapis.com/css2?family=Jura:wght@500;700&family=Oswald:wght@400&display=swap");

  .dual-fx-theme {
    font-family: "Oswald", sans-serif;
    background-color: #313338;
    padding: 2vh 2vw;
    border-radius: 8px;
    color: #b0b1b3;
    box-sizing: border-box;

    /* Der Trick für Fullscreen: Modul auf volle Höhe zwingen */
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px); /* Bildschirmhöhe minus Navigation/Padding */
    min-height: 400px; /* Fallback, damit es auf winzigen Screens nicht kaputt geht */
  }

  .dual-fx-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5vh;
    border-bottom: 2px solid #5a5c60;
    padding-bottom: 1vh;
    flex-shrink: 0; /* Header darf nicht mitschrumpfen */
  }

  .dual-fx-title {
    color: #ffffff;
    font-family: "Jura", sans-serif;
    /* Schrift wächst mit der Fenstergröße mit! */
    font-size: clamp(24px, 4vh + 2vw, 70px);
    font-weight: 700;
    letter-spacing: 2px;
    margin: 0;
  }

  .dual-fx-logo {
    width: clamp(30px, 5vh + 2vw, 80px);
    height: auto;
  }

  /* Flexbox anstelle von Table für die vertikale Dehnung */
  .fx-list {
    display: flex;
    flex-direction: column;
    flex-grow: 1; /* Nimmt den gesamten restlichen Platz ein */
    width: 100%;
  }

  .fx-row {
    display: flex;
    align-items: center;
    flex-grow: 1; /* Jede Zeile dehnt sich gleichmäßig in die Höhe! */
    border-bottom: 1px solid #444649;
    /* Dynamische Schriftgröße für die Tabellen-Inhalte */
    font-size: clamp(10px, 2vh + 0.5vw, 40px);
    text-transform: uppercase;
    line-height: 1.1;
  }

  .fx-row:last-child {
    border-bottom: none;
  }

  .fx-row.header {
    flex-grow: 0; /* Tabellenkopf bleibt schmal */
    padding-bottom: 1vh;
    border-bottom: 2px solid #ffffff;
    font-family: "Jura", sans-serif;
    font-weight: 700;
    font-size: clamp(10px, 1.5vh + 0.5vw, 30px);
    color: #ffffff;
  }

  /* Spaltenbreiten */
  .col-led {
    width: 15%;
    min-width: 40px;
    display: flex;
    align-items: center;
    gap: clamp(2px, 0.5vw, 10px);
  }
  .col-fx {
    width: 30%;
    color: #e0e0e0;
    font-weight: bold;
  }
  .col-mix {
    width: 15%;
  }
  .col-p1 {
    width: 20%;
  }
  .col-p2 {
    width: 20%;
  }

  /* Mitwachsende LEDs */
  .led {
    width: clamp(8px, 1.5vh + 0.2vw, 30px);
    height: clamp(8px, 1.5vh + 0.2vw, 30px);
    border-radius: 50%;
    box-shadow:
      0 1px 2px rgba(0, 0, 0, 0.4),
      inset 0 -1px 2px rgba(0, 0, 0, 0.4);
  }

  .led.grey {
    background: radial-gradient(circle at 35% 35%, #8e9092, #47494c, #1f2022);
  }

  .led.red {
    background: radial-gradient(circle at 35% 35%, #ff5e5e, #e60000, #660000);
    box-shadow:
      0 0 6px rgba(255, 0, 0, 0.5),
      inset 0 -1px 2px rgba(0, 0, 0, 0.4);
  }

  /* Print-Optimierung */
  @media print {
    .dual-fx-theme {
      background-color: #fff;
      padding: 0;
      color: #000;
      height: 100vh;
      border: none;
    }
    .dual-fx-title,
    .fx-row.header {
      color: #000;
      border-bottom-color: #000;
    }
    .fx-row {
      color: #222;
      border-bottom-color: #ccc;
    }
    .col-fx {
      color: #000;
    }
    .led.grey {
      background: #ccc;
      box-shadow: none;
      border: 1px solid #999;
    }
    .led.red {
      background: #e60000;
      box-shadow: none;
      border: 1px solid #900;
    }
    .dual-fx-logo path,
    .dual-fx-logo circle {
      stroke: #000 !important;
    }
    .dual-fx-logo path[fill="#313338"] {
      fill: #fff !important;
    }
  }
</style>
